<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PDEX Terminal - Empty State</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Segoe UI', sans-serif; background: #0d1117; color: #c9d1d9; height: 100vh; display: flex; flex-direction: column; }

  .topbar {
    display: flex; align-items: center; justify-content: space-between;
    background: #161b22; border-bottom: 1px solid #30363d;
    padding: 10px 20px; height: 56px; flex-shrink: 0;
  }
  .topbar .logo { font-size: 16px; font-weight: 700; color: #58a6ff; }
  .topbar .wallet-input { display: flex; align-items: center; gap: 8px; }
  .topbar .wallet-input input {
    background: #0d1117; border: 1px solid #30363d; color: #c9d1d9;
    padding: 6px 12px; border-radius: 6px; width: 340px; font-size: 13px;
  }
  .topbar .wallet-input input::placeholder { color: #484f58; }
  .topbar .wallet-input button {
    background: #238636; color: #fff; border: none; padding: 6px 16px;
    border-radius: 6px; cursor: pointer; font-size: 13px; opacity: 0.5;
  }
  .topbar .stats { display: flex; gap: 24px; font-size: 13px; color: #484f58; }

  .main-empty {
    flex: 1; display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 32px;
  }
</style>
</head>
<body>

<!-- ========== TOP BAR (미연결 상태) ========== -->
<div class="topbar">
  <div class="logo">⚡ PDEX Terminal</div>
  <div class="wallet-input">
    <select style="background:#0d1117; border:1px solid #30363d; color:#58a6ff; padding:6px 10px; border-radius:6px; font-size:13px; font-weight:600; cursor:pointer; opacity:0.5;">
      <option>Hyperliquid</option>
      <option>Aster</option>
    </select>
    <input type="text" placeholder="지갑 주소를 입력하세요 (0x...)" />
    <button>연결</button>
  </div>
  <div class="stats">
    <span>Risk --</span>
  </div>
</div>

<!-- ========== EMPTY STATE ========== -->
<div class="main-empty">

  <!-- Hero Icon -->
  <div style="font-size: 64px; opacity: 0.3;">⚡</div>

  <!-- Title -->
  <div style="text-align: center;">
    <div style="font-size: 24px; font-weight: 700; color: #c9d1d9; margin-bottom: 8px;">
      PDEX Terminal에 오신 것을 환영합니다
    </div>
    <div style="font-size: 14px; color: #8b949e; line-height: 1.6;">
      Hyperliquid 포지션을 실시간으로 모니터링하고<br/>
      AI 기반 리스크 분석을 받아보세요
    </div>
  </div>

  <!-- Address Input (큰 버전) -->
  <div style="display: flex; align-items: center; gap: 12px;">
    <div style="position: relative;">
      <input type="text" placeholder="0x로 시작하는 지갑 주소를 입력하세요"
        style="background: #161b22; border: 1px solid #30363d; color: #c9d1d9;
        padding: 14px 20px; border-radius: 10px; width: 480px; font-size: 15px;
        outline: none; transition: border-color 0.2s;"
        onfocus="this.style.borderColor='#58a6ff'" onblur="this.style.borderColor='#30363d'" />
    </div>
    <button style="background: #238636; color: #fff; border: none; padding: 14px 28px;
      border-radius: 10px; cursor: pointer; font-size: 15px; font-weight: 600;
      transition: background 0.2s;"
      onmouseover="this.style.background='#2ea043'" onmouseout="this.style.background='#238636'">
      연결하기
    </button>
  </div>

  <!-- Feature Cards -->
  <div style="display: flex; gap: 20px; margin-top: 16px;">

    <div style="background: #161b22; border: 1px solid #30363d; border-radius: 12px;
      padding: 20px; width: 200px; text-align: center;">
      <div style="font-size: 28px; margin-bottom: 10px;">📊</div>
      <div style="font-size: 13px; font-weight: 600; margin-bottom: 6px;">실시간 포트폴리오</div>
      <div style="font-size: 11px; color: #8b949e; line-height: 1.5;">
        포지션, 오더, 자산 현황을<br/>실시간으로 확인
      </div>
    </div>

    <div style="background: #161b22; border: 1px solid #30363d; border-radius: 12px;
      padding: 20px; width: 200px; text-align: center;">
      <div style="font-size: 28px; margin-bottom: 10px;">📈</div>
      <div style="font-size: 13px; font-weight: 600; margin-bottom: 6px;">마켓 데이터</div>
      <div style="font-size: 11px; color: #8b949e; line-height: 1.5;">
        차트, 오더북, 펀딩 레이트를<br/>한 화면에서 확인
      </div>
    </div>

    <div style="background: #161b22; border: 1px solid #30363d; border-radius: 12px;
      padding: 20px; width: 200px; text-align: center;">
      <div style="font-size: 28px; margin-bottom: 10px;">🤖</div>
      <div style="font-size: 13px; font-weight: 600; margin-bottom: 6px;">AI 분석</div>
      <div style="font-size: 11px; color: #8b949e; line-height: 1.5;">
        리스크, 펀딩, OI를<br/>AI가 자동 분석
      </div>
    </div>

  </div>

  <!-- Sample Address Hint -->
  <div style="margin-top: 8px; font-size: 12px; color: #484f58;">
    테스트 주소: <span style="color: #58a6ff; cursor: pointer; text-decoration: underline;">0x1234...abcd</span> 를 클릭해서 체험해보세요
  </div>

</div>

</body>
</html>
